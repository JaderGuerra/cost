<div class="flex items-center justify-between w-full gap-4">
  @if (label()) {
  <span class="text-sm font-medium text-gray-50">{{ label() }}</span>
  }

  <button type="button" (click)="toggle()" [class.bg-orange-500]="checked()" [class.bg-gray-700]="!checked()"
    class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-orange-400 focus:ring-offset-2 focus:ring-offset-gray-800">

    <span [class.translate-x-5]="checked()" [class.translate-x-0]="!checked()"
      class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out">
    </span>
  </button>
</div>
