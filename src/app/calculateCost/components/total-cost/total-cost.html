<div class="bg-gray-800 xl:rounded-t-lg sticky top-0 w-full flex items-center justify-between p-4">
  <h1 class="text-white font-semibold mt-2 text-2xl">Total {{totalCost() | currency}}</h1>
  <button (click)="saveCurrentHistory()" [disabled]="listItems().length === 0"
    class="w-fit p-1.5 bg-orange-600 hover:bg-orange-500 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed text-white font-bold rounded-lg cursor-pointer transition-colors">
    Complete
  </button>
</div>
