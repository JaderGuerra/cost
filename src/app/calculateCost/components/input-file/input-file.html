<div class="flex flex-col gap-1 w-full">
  @if (label()) {
  <label class="text-sm font-medium text-gray-50">{{ label() }}</label>
  }
  <input #inputRef [type]="type()" [value]="value()" [inputMode]="inputMode()" [placeholder]="placeholder()"
    (input)="onInput($event)"
    class="border rounded-md p-2 outline-none focus:ring-2 focus:ring-gray-900 border-gray-300 placeholder:text-white text-white" />
</div>
